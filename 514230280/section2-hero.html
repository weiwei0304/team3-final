<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Section 2 — Hero</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Georgia, serif;
        background: #fff;
        color: #111;
        min-height: 100vh;
      }

      .hero {
        padding: 80px 48px 60px;
        max-width: 700px;
        margin: 0 auto;
        text-align: center;
      }
      .badge {
        display: inline-block;
        background: #f3f4f6;
        color: #374151;
        font-family: "Segoe UI", sans-serif;
        font-size: 0.72rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 5px 14px;
        border-radius: 999px;
        margin-bottom: 28px;
        border: 1px solid #e5e7eb;
      }
      .hero h1 {
        font-size: 3.2rem;
        font-weight: 400;
        line-height: 1.15;
        letter-spacing: -0.02em;
        margin-bottom: 20px;
      }
      .hero h1 em {
        font-style: italic;
        color: #2563eb;
      }
      .hero p {
        font-size: 1rem;
        color: #6b7280;
        line-height: 1.85;
        font-family: "Segoe UI", sans-serif;
        margin-bottom: 32px;
      }
      .btns {
        display: flex;
        gap: 12px;
        justify-content: center;
      }
      .btn-a {
        background: #111;
        color: #fff;
        padding: 12px 28px;
        border-radius: 4px;
        font-family: "Segoe UI", sans-serif;
        font-size: 0.88rem;
        font-weight: 600;
      }
      .btn-b {
        background: transparent;
        color: #374151;
        padding: 12px 28px;
        border-radius: 4px;
        font-family: "Segoe UI", sans-serif;
        font-size: 0.88rem;
        border: 1px solid #d1d5db;
      }

    </style>
  </head>
  <body>
    <div class="hero">
      <div class="badge">輔仁大學 AI 專班 · 期末專題 2026</div>
      <h1>從資料混沌<br />到<em>清晰決策</em></h1>
      <p>
        我們用機器學習處理那些人腦難以應付的資料量，<br />讓你在開會前就知道答案在哪裡。
      </p>
      <div class="btns">
        <div class="btn-a">探索功能模組</div>
        <div class="btn-b">看成果展示</div>
      </div>
    </div>
  </body>
</html>
