<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Section 1 — 導航列</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        padding: 40px;
      }
      .nav-box {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 10px;
        overflow: hidden;
      }
      .nav-bar {
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
      }
      .brand {
        font-size: 1rem;
        font-weight: 800;
        color: #3b82f6;
        letter-spacing: 0.05em;
      }
      .links {
        display: flex;
        gap: 24px;
        list-style: none;
      }
      .links li a {
        text-decoration: none;
        color: #94a3b8;
        font-size: 0.85rem;
      }
      .cta {
        background: #3b82f6;
        color: #fff;
        padding: 6px 16px;
        border-radius: 6px;
        font-size: 0.82rem;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="nav-box">
      <div class="nav-bar">
        <div class="brand">team3_final</div>
        <ul class="links">
          <li><a href="#">關於</a></li>
          <li><a href="#">功能</a></li>
          <li><a href="#">指標</a></li>
          <li><a href="#">成果</a></li>
          <li><a href="#">聯絡</a></li>
        </ul>
        <div class="cta">開始 →</div>
      </div>
    </div>
  </body>
</html>
